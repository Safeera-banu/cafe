<%@ page contentType="text/html;charset=UTF-8" language="java" %>
  <!DOCTYPE html>
  <html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Book a Table — Café Noir</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet">
    <style>
      :root {
        --cream: #F5EFE0;
        --espresso: #2C1A0E;
        --mocha: #6B3E26;
        --latte: #C9A87C;
        --bg: #1A0F07;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Lato', sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        align-items: center;
      }

      .card {
        background: var(--cream);
        border-radius: 6px;
        padding: 48px;
        max-width: 500px;
        width: 100%;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
      }

      h2 {
        font-family: 'Playfair Display', serif;
        font-size: 28px;
        color: var(--espresso);
        margin-bottom: 6px;
      }

      .sub {
        font-size: 13px;
        color: #888;
        margin-bottom: 28px;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--mocha);
        font-weight: 700;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid rgba(107, 62, 38, 0.2);
        border-radius: 3px;
        font-family: 'Lato', sans-serif;
        font-size: 15px;
        color: var(--espresso);
        outline: none;
        background: #fff;
        transition: border-color 0.2s;
      }

      input:focus {
        border-color: var(--mocha);
      }

      .btn {
        width: 100%;
        padding: 14px;
        background: var(--espresso);
        color: var(--cream);
        border: none;
        border-radius: 3px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        cursor: pointer;
        margin-top: 8px;
        transition: background 0.2s;
      }

      .btn:hover {
        background: var(--mocha);
      }

      .alert-error {
        background: #fde8e8;
        color: #9b1c1c;
        border-left: 3px solid #e53e3e;
        padding: 12px 16px;
        border-radius: 3px;
        font-size: 13px;
        margin-bottom: 18px;
      }
    </style>
  </head>

  <body>

    <div class="card">
      <h2>Book a Table</h2>
      <p class="sub">Fill in your details and we'll confirm your reservation.</p>


      <form action="ReservationServlet" method="post">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" required />
        </div>
        <div class="form-group">
          <label for="people">Number of Guests</label>
          <input type="number" id="people" name="people" min="1" max="20" placeholder="e.g. 2" required />
        </div>
        <button type="submit" class="btn">Reserve My Table</button>
      </form>
    </div>
  </body>

  </html>
